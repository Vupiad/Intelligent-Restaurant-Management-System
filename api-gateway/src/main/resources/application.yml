server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: menu-service-route
          uri: lb://menu-service
          predicates:
            - Path=/api/menu/**

        - id: order-service-route
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: kds-service-route
          uri: lb://kds-service
          predicates:
            - Path=/api/kds/**

        - id: kds-websocket-route
          uri: lb:ws://kds-service
          predicates:
            - Path=/ws/kds/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  security:
    jwk-set-uri: http://auth-service/api/auth/.well-known/jwks.json
