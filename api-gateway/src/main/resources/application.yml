server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            maxAge: 3600
      routes:
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: menu-service-route
          uri: lb://menu-service
          predicates:
            - Path=/api/menu/**

        - id: ordering-service-route
          uri: lb://ordering-service
          predicates:
            - Path=/api/orders/**

        - id: ordering-websocket-route
          uri: lb:ws://ordering-service
          predicates:
            - Path=/ws/order/**
          filters:
            # This strips the extra CORS header coming from the KDS service
            # so the browser only sees the Gateway's CORS header.
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

        - id: kds-service-route
          uri: lb://kds-service
          predicates:
            - Path=/api/kds/**

        - id: kds-websocket-route
          uri: lb:ws://kds-service
          predicates:
            - Path=/ws/kds/**
          filters:
            # This strips the extra CORS header coming from the KDS service
            # so the browser only sees the Gateway's CORS header.
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

app:
  security:
    jwk-set-uri: http://auth-service/api/auth/.well-known/jwks.json
