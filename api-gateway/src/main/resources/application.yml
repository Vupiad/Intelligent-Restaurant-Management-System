server:
  port: 8080 # The Gateway is the new front door for your React app

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Route 1: Forward login/register requests to the Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

  security:
    oauth2:
      resourceserver:
        jwt:
          # The Gateway automatically downloads your public RSA key from here!
          jwk-set-uri: http://localhost:8081/api/auth/.well-known/jwks.json
