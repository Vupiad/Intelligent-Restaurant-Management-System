server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:

    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require

    username: ${SUPABASE_USER}

    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

auth:
  jwt:
    keystore:
      location: ${JWT_KEYSTORE_LOCATION:classpath:irms-keystore.jks}
      password: ${JWT_KEYSTORE_PASSWORD}
      alias: ${JWT_KEY_ALIAS:irms-key}
      key-password: ${JWT_KEY_PASSWORD:${JWT_KEYSTORE_PASSWORD}}

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${EUREKA_INSTANCE_HOSTNAME:${HOSTNAME:localhost}}
    non-secure-port-enabled: ${EUREKA_NON_SECURE_PORT_ENABLED:true}
    secure-port-enabled: ${EUREKA_SECURE_PORT_ENABLED:false}
    secure-port: ${EUREKA_SECURE_PORT:443}
    home-page-url: ${EUREKA_HOME_PAGE_URL:http://${eureka.instance.hostname}:${server.port}/}
    status-page-url: ${EUREKA_STATUS_PAGE_URL:${eureka.instance.home-page-url}}
    health-check-url: ${EUREKA_HEALTH_CHECK_URL:${eureka.instance.home-page-url}}
  client:
    service-url:
      # Tell the KDS service where the Eureka server lives
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
